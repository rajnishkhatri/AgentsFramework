info:
  description: AG-UI Agent Protocol routes exposed by agent_ui_adapter. Generated
    from Pydantic wire models.
  title: Agent UI Adapter
  version: 0.1.0
openapi: 3.1.0
paths:
  /agent/runs/stream:
    post:
      operationId: streamRun
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RunCreateRequest'
        required: true
      responses:
        '200':
          content:
            text/event-stream:
              schema:
                format: event-stream
                type: string
          description: AG-UI event stream
        '401':
          description: Unauthorized
      summary: Open an SSE stream of AG-UI events for a run
  /agent/runs/{run_id}:
    delete:
      operationId: cancelRun
      parameters:
      - in: path
        name: run_id
        required: true
        schema:
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RunStateView'
          description: Cancelled run state
        '404':
          description: Run not found
      summary: Cancel a run
    get:
      operationId: getRun
      parameters:
      - in: path
        name: run_id
        required: true
        schema:
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RunStateView'
          description: Run state
        '404':
          description: Run not found
      summary: Get run state
  /agent/threads:
    get:
      operationId: listThreads
      responses:
        '200':
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/ThreadState'
                type: array
          description: List of threads
      summary: List threads
    post:
      operationId: createThread
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ThreadCreateRequest'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ThreadState'
          description: Created thread
      summary: Create a thread
  /agent/threads/{thread_id}:
    get:
      operationId: getThread
      parameters:
      - in: path
        name: thread_id
        required: true
        schema:
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ThreadState'
          description: Thread state
      summary: Get a thread
  /healthz:
    get:
      operationId: healthz
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
          description: Healthy
      summary: Liveness probe
